worker_processes 5;
daemon off;

error_log /dev/stderr;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    access_log /dev/stdout;

    server {
        listen 8000;
        server_name _;
        root /app/public;
        index index.php;

        charset utf-8;

        # Segurança
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Bloquear acesso a arquivos sensíveis
        location ~ \.(db|sqlite|env|log)$ {
            deny all;
            return 404;
        }

        # Bloquear acesso a diretórios internos
        location ~ ^/(config|database|src|templates) {
            deny all;
            return 404;
        }

        # Servir arquivos estáticos ou enviar para index.php
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # Processar PHP
        location ~ \.php$ {
            try_files $uri =404;
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
        }

        # Cache de assets estáticos
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # GZIP
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
        gzip_min_length 1000;
    }
}
